<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jenkins Demo</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #f0f4ff, #e8fff7);
            color: #1f2937;
            display: flex;
            min-height: 100vh;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: rgba(255, 255, 255, 0.92);
            padding: 32px 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
            text-align: center;
            max-width: 520px;
        }

        h1 {
            margin: 0 0 12px;
            font-size: 2rem;
        }

        p {
            margin: 0 0 20px;
            line-height: 1.6;
        }

        button {
            border: none;
            border-radius: 999px;
            background: #2563eb;
            color: white;
            padding: 12px 22px;
            font-size: 1rem;
            cursor: pointer;
        }

        button:hover {
            background: #1d4ed8;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>Jenkins Demo</h1>
    <p>这是一个简单的静态页面演示，可以用于快速确认项目已正常部署并访问成功。</p>
    <button onclick="alert('演示按钮点击成功！')">点我试试</button>
</div>
</body>
</html>
